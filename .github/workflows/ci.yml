name: PHP Syntax Check (Lint)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        coverage: none

    - name: Run PHP Lint
      run: |
        # Find all PHP files, excluding the vendored includes/ directory, and check for syntax errors
        find . -name "*.php" ! -path "*/includes/*" -type f -print0 | xargs -0 -n 1 -P 4 php -l
